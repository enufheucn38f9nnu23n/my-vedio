<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .video-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            background: black;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            background: black;
        }
        .info {
            width: 100%;
            max-width: 1400px;
            padding: 16px 24px;
            background: #0a0a0a;
            color: #e5e7eb;
            font-size: 14px;
            border-top: 1px solid #2a2a2a;
            text-align: center;
        }
        @media (max-width: 768px) {
            .info {
                padding: 12px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video controls autoplay muted playsinline preload="metadata">
            <source src="video.mp4" type="video/mp4">
            您的浏览器不支持视频播放。
        </video>
    </div>
    <div class="info">
        作品展示
    </div>
</body>
</html>
