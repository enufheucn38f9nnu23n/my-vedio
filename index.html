<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
        }
        .card {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
            background: black;
        }
        .caption {
            padding: 20px 24px;
            font-size: 15px;
            color: #1f2937;
            border-top: 1px solid #e5e7eb;
            background: white;
            text-align: center;
        }
        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }
            .caption {
                padding: 14px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <video controls autoplay muted playsinline preload="metadata">
            <source src="video.mp4" type="video/mp4">
            您的浏览器不支持视频播放。
        </video>
        <div class="caption">
            作品展示
        </div>
    </div>
</body>
</html>
