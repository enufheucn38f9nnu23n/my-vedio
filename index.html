<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
        }
        .card {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
            background: black;
        }
        .caption {
            padding: 1.25rem 1.8rem;
            font-size: 1rem;
            color: #1f2a3e;
            background: white;
            border-top: 1px solid #e9edf2;
        }
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .caption {
                padding: 1rem 1.25rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <video controls autoplay muted playsinline preload="metadata">
            <source src="video.mp4" type="video/mp4">
            您的浏览器不支持视频播放。
        </video>
        <div class="caption">
            作品展示
        </div>
    </div>
</body>
</html>
